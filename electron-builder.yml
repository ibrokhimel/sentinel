appId: com.sentinel.app
productName: Sentinel
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Personal/local build: ad-hoc signature only (no Apple Developer account,
# no notarization). Apple Silicon requires at least an ad-hoc signature.
mac:
  target:
    - dmg
    - dir
  category: public.app-category.developer-tools
  identity: null
  hardenedRuntime: false
# Native modules (node-pty) must ship unpacked so the .node binary loads.
asarUnpack:
  - "**/node_modules/@homebridge/node-pty-prebuilt-multiarch/**"
npmRebuild: false
